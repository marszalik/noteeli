<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#152338"/>
      <stop offset="100%" stop-color="#0b1220"/>
    </linearGradient>
  </defs>
  <!-- full-bleed background (safe for maskable icons) -->
  <rect width="512" height="512" fill="url(#bg)"/>

  <!-- notebook body — sits within the ~80% safe zone -->
  <rect x="130" y="96" width="268" height="320" rx="22" fill="#f4efe4"/>
  <!-- left binding strip -->
  <rect x="130" y="96" width="56" height="320" fill="#e2d9c4"/>
  <!-- spiral rings -->
  <g fill="none" stroke="#0b1220" stroke-width="11" stroke-linecap="round">
    <path d="M158 128 v30"/>
    <path d="M158 192 v30"/>
    <path d="M158 256 v30"/>
    <path d="M158 320 v30"/>
    <path d="M158 384 v20"/>
  </g>

  <!-- letter E -->
  <text x="290" y="316"
        font-family="'IBM Plex Sans', 'Segoe UI', system-ui, sans-serif"
        font-size="200"
        font-weight="700"
        text-anchor="middle"
        fill="#0f766e">E</text>
</svg>
